# ==========================================
# TEST CONFIGURATION
# Self-contained: no environment variables or real secrets required.
# Overrides src/main/resources/application.properties on the test classpath.
# ==========================================
server.port=0

# In-memory H2 so tests never touch ./data/finanzas_db
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Flyway owns the schema; Hibernate only validates the entity mapping against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Map STRING enums to plain VARCHAR (not H2-native ENUM) so one migration is
# portable across H2 and PostgreSQL and validate agrees on both.
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR

# H2 console disabled in tests
spring.h2.console.enabled=false

# Dummy mail config — no real SMTP credentials needed
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@localhost
spring.mail.password=test

# Throwaway JWT secret (base64, 48 bytes) — test-only, never used in prod
jwt.secret=QPqvHaV/N5adUOlftOa3g6xvUiC/eBeGNc4dRNlaKLHyrO53FWeyvdNeIoexb0jN
jwt.expiration=86400000
jwt.refresh-expiration=2592000000
