spring.application.name=api

# Nombre y credenciales de la base de datos en memoria
spring.datasource.url=jdbc:h2:mem:finanzasdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Magia de Hibernate: Creará las tablas SQL automáticamente leyendo tu código Java
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Habilita un panel visual en tu navegador para ver la base de datos
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=true